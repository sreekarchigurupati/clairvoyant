name: Release

# Tag a commit `vX.Y.Z` and push it to cut a release:
#   git tag v0.1.0 && git push origin v0.1.0
# Builds the relay (npm tarball + publish) and the signed glasses APK, then attaches
# both to a GitHub Release. The tag (minus the leading "v") drives every version string.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release and upload assets

jobs:
  relay:
    name: Build & publish relay
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: relay
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Derive version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - run: npm ci

      - name: Set package version to the tag
        run: npm version "$VERSION" --no-git-tag-version --allow-same-version

      - run: npm test

      - name: Pack tarball
        run: npm pack

      # Upload before publishing so a bad/expired npm token can't cost us the GitHub Release
      # asset — the tarball is always attached; npm publish is attempted separately below.
      - uses: actions/upload-artifact@v4
        with:
          name: relay-tarball
          path: relay/clairvoyant-relay-*.tgz
          if-no-files-found: error

      # Best-effort: a failure here (e.g. token needs OTP) is surfaced but doesn't block the
      # release. Use an npm **Automation** token in NPM_TOKEN so CI isn't prompted for 2FA.
      - name: Publish to npm
        continue-on-error: true
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  app:
    name: Build signed APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Derive version from tag
        # versionName = tag without "v"; versionCode = run number (monotonic).
        run: |
          echo "VERSION_NAME=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          echo "VERSION_CODE=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set; cannot build a signed APK."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew :app:assembleRelease \
            -PversionName="$VERSION_NAME" \
            -PversionCode="$VERSION_CODE"

      - name: Rename APK
        run: |
          mkdir -p out
          cp app/build/outputs/apk/release/app-release.apk \
             "out/clairvoyant-${VERSION_NAME}.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: out/clairvoyant-*.apk
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [relay, app]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/relay-tarball/*.tgz
            artifacts/app-apk/*.apk
          generate_release_notes: true
